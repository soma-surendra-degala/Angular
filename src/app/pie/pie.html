<div class="home">
    <span class="text">
        Pie Chart
    </span>
<div class="main">
    <div class="box"><apx-chart
  [series]="chartSeries"
  [chart]="chartDetails"
  [labels]="labels"
  [responsive]="responsive">
</apx-chart>
</div>
</div>
<div class="container">
<div class="chart-container">
    <div class="chart" (click)="goToLine()"><i class="fas fa-chart-line"></i> Line</div>
    <div class="chart" (click)="goToBar()"><i class="fas fa-chart-bar"></i> Bar</div>
    <div class="chart" (click)="goToPie()"><i class="fas fa-chart-pie"></i> Pie</div>
    <div class="chart" (click)="goToDough()"><i class="fas fa-chart-area"></i> Doughnut</div>
</div>
</div>
</div>
